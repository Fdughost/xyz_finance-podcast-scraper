name: 播客监控日报

on:
  schedule:
    # 每天北京时间 06:00 运行（UTC 22:00 前一天）
    - cron: '0 22 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4.2.2
        with:
          # 使用 PAT 以便后续能 push 回仓库
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: 设置 Python 环境
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行播客监控
        run: python main.py

      - name: 生成网页
        run: python generate_html.py

      - name: 生成 Next.js 数据 JSON
        run: python generate_data_json.py

      - name: 提交报表和数据库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ data/podcast_monitor.db data/run_summary.json docs/ web/public/data.json
          # 如果有变更才提交
          git diff --cached --quiet || git commit -m "chore: 自动生成播客日报 $(date +'%Y-%m-%d')"
          git push

      - name: 同步数据到 nextjs 分支
        run: |
          git fetch origin nextjs
          git checkout -B _sync_tmp origin/nextjs
          git checkout main -- web/public/data.json
          git add web/public/data.json
          git diff --cached --quiet || git commit -m "chore: 更新播客数据 $(date +'%Y-%m-%d')"
          git push origin _sync_tmp:nextjs
          git checkout main
